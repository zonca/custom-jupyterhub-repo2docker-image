name: Z2JH Integration Test

on:
  workflow_run:
    workflows:
      - Build and Publish repo2docker Image
    types:
      - completed
  workflow_dispatch:

env:
  HUB_NAMESPACE: jhub-test
  HUB_API_TOKEN: ci-admin-token-change-me

jobs:
  z2jh-kind-integration:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Create Kind cluster
        uses: helm/kind-action@v1.10.0
        with:
          cluster_name: jhub-ci

      - name: Pull published image
        run: |
          docker pull "ghcr.io/${{ github.repository }}:latest"

      - name: Load image into Kind
        run: |
          kind load docker-image "ghcr.io/${{ github.repository }}:latest" --name jhub-ci

      - name: Deploy JupyterHub with Helm
        run: |
          cat > /tmp/config-ci.yaml <<'YAML'
          proxy:
            secretToken: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"

          hub:
            db:
              type: sqlite-memory
            config:
              JupyterHub:
                authenticator_class: dummy
                cleanup_servers: false
                api_tokens:
                  ci-admin-token-change-me: admin
              KubeSpawner:
                start_timeout: 600
                delete_stopped_pods: false
              Authenticator:
                allow_all: true
                admin_users:
                  - admin
              DummyAuthenticator:
                password: "ci-password"

          singleuser:
            startTimeout: 600
            uid: 1000
            fsGid: 1000
            image:
              name: ghcr.io/${{ github.repository }}
              tag: latest
              pullPolicy: IfNotPresent
            cmd: jupyterhub-singleuser
            defaultUrl: /lab

          prePuller:
            hook:
              enabled: false
            continuous:
              enabled: false
          YAML

          helm repo add jupyterhub https://jupyterhub.github.io/helm-chart/
          helm repo update
          helm upgrade --install jhub jupyterhub/jupyterhub \
            --namespace "${HUB_NAMESPACE}" \
            --create-namespace \
            --values /tmp/config-ci.yaml \
            --wait --timeout 15m

      - name: Wait for hub and proxy
        run: |
          kubectl -n "${HUB_NAMESPACE}" rollout status deploy/hub --timeout=5m
          kubectl -n "${HUB_NAMESPACE}" rollout status deploy/proxy --timeout=5m

      - name: Validate Hub API and spawn request
        run: |
          set -euo pipefail

          kubectl -n "${HUB_NAMESPACE}" port-forward svc/proxy-public 8000:80 >/tmp/pf.log 2>&1 &
          PF_PID=$!
          trap 'kill ${PF_PID}' EXIT

          for _ in $(seq 1 60); do
            if curl --max-time 5 -sf http://127.0.0.1:8000/hub/health >/dev/null; then
              break
            fi
            sleep 2
          done

          curl --max-time 10 -sf -X POST \
            -H "Authorization: token ${HUB_API_TOKEN}" \
            http://127.0.0.1:8000/hub/api/users/ci-user >/dev/null || true

          curl --max-time 10 -sf -X POST \
            -H "Authorization: token ${HUB_API_TOKEN}" \
            http://127.0.0.1:8000/hub/api/users/ci-user/server >/dev/null || true

          curl --max-time 10 -sf \
            -H "Authorization: token ${HUB_API_TOKEN}" \
            http://127.0.0.1:8000/hub/api/users/ci-user | jq -e '.name == "ci-user"' >/dev/null

      - name: Dump diagnostics on failure
        if: failure()
        run: |
          kubectl get pods -A -o wide
          kubectl -n "${HUB_NAMESPACE}" get events --sort-by=.metadata.creationTimestamp || true
          kubectl -n "${HUB_NAMESPACE}" logs deploy/hub --tail=200 || true
          kubectl -n "${HUB_NAMESPACE}" logs deploy/proxy --tail=200 || true
          kubectl -n "${HUB_NAMESPACE}" describe pod jupyter-ci-user || true
          kubectl -n "${HUB_NAMESPACE}" logs pod/jupyter-ci-user -c notebook --tail=200 || true
          kubectl -n "${HUB_NAMESPACE}" logs pod/jupyter-ci-user -c notebook --previous --tail=200 || true
          kubectl -n "${HUB_NAMESPACE}" get pods -l component=singleuser-server -o name | \
            xargs -r -I {} kubectl -n "${HUB_NAMESPACE}" logs {} --tail=200 || true
