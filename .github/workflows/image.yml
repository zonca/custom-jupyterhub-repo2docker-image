name: Build and Publish repo2docker Image

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: "0 10 * * 1"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set image tags
        id: tags
        run: |
          SHORT_SHA="$(git rev-parse --short=12 HEAD)"
          echo "sha_tag=sha-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "image=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install repo2docker
        run: |
          python -m pip install --upgrade pip
          pip install jupyter-repo2docker

      - name: Run smoke tests in image
        run: |
          jupyter-repo2docker --no-run \
            --image-name "${{ steps.tags.outputs.image }}:${{ steps.tags.outputs.sha_tag }}" \
            .
          docker run --rm \
            -v "${{ github.workspace }}/tests/test_image.py:/tmp/test_image.py" \
            "${{ steps.tags.outputs.image }}:${{ steps.tags.outputs.sha_tag }}" \
            python /tmp/test_image.py

  publish:
    if: github.event_name != 'pull_request'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set image tags
        id: tags
        run: |
          SHORT_SHA="$(git rev-parse --short=12 HEAD)"
          DATE_TAG="$(date +%Y-%m-%d)-$(git rev-parse --short=7 HEAD)"
          echo "sha_tag=sha-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "date_tag=${DATE_TAG}" >> "$GITHUB_OUTPUT"
          echo "image=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install repo2docker
        run: |
          python -m pip install --upgrade pip
          pip install jupyter-repo2docker

      - name: Build image with repo2docker
        run: |
          jupyter-repo2docker --no-run \
            --image-name "${{ steps.tags.outputs.image }}:${{ steps.tags.outputs.sha_tag }}" \
            .

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and push image
        run: |
          IMAGE="${{ steps.tags.outputs.image }}"
          SHA_TAG="${{ steps.tags.outputs.sha_tag }}"
          DATE_TAG="${{ steps.tags.outputs.date_tag }}"

          docker tag "${IMAGE}:${SHA_TAG}" "${IMAGE}:latest"
          docker tag "${IMAGE}:${SHA_TAG}" "${IMAGE}:${DATE_TAG}"

          docker push "${IMAGE}:${SHA_TAG}"
          docker push "${IMAGE}:${DATE_TAG}"
          docker push "${IMAGE}:latest"

      - name: Resolve image digest
        id: digest
        run: |
          IMAGE="${{ steps.tags.outputs.image }}"
          SHA_TAG="${{ steps.tags.outputs.sha_tag }}"
          DIGEST="$(docker image inspect --format='{{index .RepoDigests 0}}' "${IMAGE}:${SHA_TAG}" | awk -F'@' '{print $2}')"
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "### Published image" >> "$GITHUB_STEP_SUMMARY"
          echo "- Image: ${IMAGE}" >> "$GITHUB_STEP_SUMMARY"
          echo "- SHA tag: ${SHA_TAG}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Date tag: ${{ steps.tags.outputs.date_tag }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Digest: ${DIGEST}" >> "$GITHUB_STEP_SUMMARY"

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign published tags
        env:
          IMAGE: ${{ steps.tags.outputs.image }}
          SHA_TAG: ${{ steps.tags.outputs.sha_tag }}
          DATE_TAG: ${{ steps.tags.outputs.date_tag }}
        run: |
          cosign sign --yes "${IMAGE}:${SHA_TAG}"
          cosign sign --yes "${IMAGE}:${DATE_TAG}"
          cosign sign --yes "${IMAGE}:latest"

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ steps.tags.outputs.image }}:${{ steps.tags.outputs.sha_tag }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ steps.tags.outputs.image }}
          subject-digest: ${{ steps.digest.outputs.digest }}
          push-to-registry: true
