name: Build and Publish repo2docker Image

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: "0 10 * * 1"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build with repo2docker (no push)
        id: r2d
        uses: jupyterhub/repo2docker-action@0.3
        with:
          NO_PUSH: "true"
          DOCKER_USERNAME: ${{ github.actor }}
          DOCKER_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
          DOCKER_REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}

      - name: Run smoke tests in image
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/tests/test_image.py:/tmp/test_image.py" \
            "${{ steps.r2d.outputs.IMAGE_SHA_NAME }}" \
            python /tmp/test_image.py

  publish:
    if: github.event_name != 'pull_request'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set date tag
        id: tag
        run: |
          DATE_TAG="$(date +%Y-%m-%d)-$(git rev-parse --short=7 HEAD)"
          echo "date_tag=${DATE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push with repo2docker
        id: r2d
        uses: jupyterhub/repo2docker-action@0.3
        with:
          DOCKER_USERNAME: ${{ github.actor }}
          DOCKER_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
          DOCKER_REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          ADDITIONAL_TAG: ${{ steps.tag.outputs.date_tag }}

      - name: Resolve image digest
        id: digest
        run: |
          IMAGE_SHA_NAME="${{ steps.r2d.outputs.IMAGE_SHA_NAME }}"
          SHA_TAG="${IMAGE_SHA_NAME##*:}"
          DIGEST=$(docker image inspect --format='{{index .RepoDigests 0}}' "${IMAGE_SHA_NAME}" | awk -F'@' '{print $2}')
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=${SHA_TAG}" >> "$GITHUB_OUTPUT"
          echo "### Published image" >> "$GITHUB_STEP_SUMMARY"
          echo "- Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- SHA tag: ${SHA_TAG}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Date tag: ${{ steps.tag.outputs.date_tag }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Digest: ${DIGEST}" >> "$GITHUB_STEP_SUMMARY"

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign published tags
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        run: |
          cosign sign --yes "${IMAGE}:${{ steps.digest.outputs.sha_tag }}"
          cosign sign --yes "${IMAGE}:${{ steps.tag.outputs.date_tag }}"
          cosign sign --yes "${IMAGE}:latest"

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ steps.r2d.outputs.IMAGE_SHA_NAME }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.digest.outputs.digest }}
          push-to-registry: true
